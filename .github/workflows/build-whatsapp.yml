name: Build WhatsApp Web (aarch64)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --locked --target aarch64-unknown-linux-gnu --features whatsapp-web
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          cd target/aarch64-unknown-linux-gnu/release
          tar czf ../../../zeroclaw-aarch64-whatsapp-web.tar.gz zeroclaw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64-whatsapp-web
          path: zeroclaw-aarch64-whatsapp-web.tar.gz

      - name: Delete existing release
        run: gh release delete whatsapp-latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete existing tag
        run: git push origin :refs/tags/whatsapp-latest 2>/dev/null || true

      - name: Create release
        run: |
          gh release create whatsapp-latest \
            zeroclaw-aarch64-whatsapp-web.tar.gz \
            --title "WhatsApp Web Build (v${{ steps.version.outputs.version }})" \
            --notes "Auto-built from upstream v${{ steps.version.outputs.version }} with --features whatsapp-web for aarch64." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
